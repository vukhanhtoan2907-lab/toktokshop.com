<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        /* Lớp nền đen che phủ toàn bộ */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9998;
            pointer-events: none;
            display: block;
        }
        /* Jumpscare ảnh toàn màn hình */
        #jumpscare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
        }
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Cửa sổ con (giống theannoyingsite) */
        .window-popup {
            position: fixed;
            background: #1a1a1a;
            border: 2px solid #ff0040;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.4);
            overflow: hidden;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #ff3366;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3366;
            cursor: default;
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .window-popup .number {
            animation: flicker 0.4s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.6; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        /* Nút đóng giả (chỉ để giống) */
        .window-popup .fake-close {
            position: absolute;
            top: 2px;
            right: 6px;
            color: #ff0040;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 0 6px;
            border-radius: 50%;
            line-height: 1.2;
        }
        .window-popup .fake-close:hover {
            color: #fff;
            background: #ff0040;
        }
        /* Chữ di chuyển / mờ */
        .moving-text {
            position: fixed;
            color: #ff0040;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.7;
            z-index: 50;
            text-shadow: 0 0 5px #ff0040;
            white-space: nowrap;
            animation: moveText 8s linear infinite alternate;
        }
        @keyframes moveText {
            0% { transform: translate(0, 0); }
            25% { transform: translate(50px, -30px); }
            50% { transform: translate(-40px, 60px); }
            75% { transform: translate(30px, -50px); }
            100% { transform: translate(-20px, 40px); }
        }
        /* Nội dung chính (nhưng che khuất) */
        #main-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
        }
        #main-content h1 {
            font-size: 60px;
            color: #ff3333;
            text-shadow: 0 0 30px #ff3333;
        }
        /* Nút mở cửa sổ mới (giống) */
        #open-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: #ff0040;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 0 20px #ff0040;
            transition: 0.2s;
        }
        #open-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff0040;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div id="jumpscare-layer">
        <img src="https://i.pinimg.com/originals/9a/1e/fe/9a1efee781490b1bf24a5fd54f0ce895.gif" alt="Jumpscare" />
    </div>

    <div id="main-content">
        <h1>BẠN ĐÃ BỊ TRÚNG</h1>
        <p style="color:#aaa; font-size:20px;">Không thoát được đâu</p>
    </div>

    <button id="open-btn">MỞ CỬA SỔ MỚI</button>

    <script>
        // --- Cửa sổ popup di chuyển toàn màn hình (giống theannoyingsite) ---
        let windowCount = 0;
        const popups = [];

        function createPopup() {
            const w = Math.floor(Math.random() * 120) + 60;  // 60-180px
            const h = Math.floor(Math.random() * 120) + 60;
            let left = Math.random() * (window.innerWidth - w);
            let top = Math.random() * (window.innerHeight - h);

            const div = document.createElement('div');
            div.className = 'window-popup';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            const num = Math.floor(Math.random() * 999999) + 1;
            const numSpan = document.createElement('span');
            numSpan.className = 'number';
            numSpan.textContent = num;
            div.appendChild(numSpan);

            // Nút đóng giả
            const closeFake = document.createElement('span');
            closeFake.className = 'fake-close';
            closeFake.textContent = '✕';
            closeFake.onclick = function(e) {
                e.stopPropagation();
                // Không đóng, chỉ đổi số
                numSpan.textContent = Math.floor(Math.random() * 999999) + 1;
            };
            div.appendChild(closeFake);

            document.body.appendChild(div);
            popups.push(div);
            windowCount++;

            // Chuyển động
            let speedX = (Math.random() - 0.5) * 4;
            let speedY = (Math.random() - 0.5) * 4;
            // Đổi hướng ngẫu nhiên
            setInterval(() => {
                speedX = (Math.random() - 0.5) * 5;
                speedY = (Math.random() - 0.5) * 5;
            }, 1500 + Math.random() * 3000);

            function movePopup() {
                if (!div.parentNode) return;
                let left = parseFloat(div.style.left);
                let top = parseFloat(div.style.top);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                
                left += speedX;
                top += speedY;

                if (left <= 0) { left = 0; speedX = -speedX; }
                if (top <= 0) { top = 0; speedY = -speedY; }
                if (left >= window.innerWidth - w) { left = window.innerWidth - w; speedX = -speedX; }
                if (top >= window.innerHeight - h) { top = window.innerHeight - h; speedY = -speedY; }

                div.style.left = left + 'px';
                div.style.top = top + 'px';
            }
            setInterval(movePopup, 16);

            // Tự động đổi số
            setInterval(() => {
                if (div.parentNode) {
                    numSpan.textContent = Math.floor(Math.random() * 999999) + 1;
                }
            }, 500 + Math.random() * 1500);
        }

        // --- Chữ di chuyển khắp màn hình ---
        function createMovingText() {
            const div = document.createElement('div');
            div.className = 'moving-text';
            div.textContent = '⚠️ BẠN KHÔNG THỂ THOÁT ⚠️';
            div.style.left = Math.random() * 80 + '%';
            div.style.top = Math.random() * 80 + '%';
            div.style.fontSize = (Math.random() * 20 + 10) + 'px';
            div.style.animationDuration = (Math.random() * 6 + 4) + 's';
            document.body.appendChild(div);
        }

        // --- Jumpscare ---
        function triggerJumpscare() {
            const layer = document.getElementById('jumpscare-layer');
            if (layer.style.display === 'flex') return;
            layer.style.display = 'flex';
            setTimeout(() => {
                layer.style.display = 'none';
            }, 1200);
        }

        // --- Khởi tạo ---
        // Tạo 30 cửa sổ ban đầu
        for (let i = 0; i < 30; i++) {
            setTimeout(() => createPopup(), i * 150);
        }
        // Tạo 20 dòng chữ di chuyển
        for (let i = 0; i < 20; i++) {
            createMovingText();
        }

        // Nút mở thêm cửa sổ
        document.getElementById('open-btn').addEventListener('click', () => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createPopup(), i * 100);
            }
            // Cơ hội jumpscare
            if (Math.random() < 0.3) triggerJumpscare();
        });

        // Click bất kỳ => jumpscare
        document.addEventListener('click', triggerJumpscare);

        // Di chuột có thể kích hoạt jumpscare
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.02) triggerJumpscare();
        });

        // Tự động thêm cửa sổ mỗi 2 giây
        setInterval(() => {
            createPopup();
            // Giới hạn số cửa sổ (xóa bớt nếu quá nhiều)
            if (popups.length > 100) {
                const old = popups.shift();
                if (old && old.parentNode) old.remove();
            }
        }, 2000);

        // Tự động thêm chữ mới mỗi 5 giây
        setInterval(() => {
            createMovingText();
        }, 5000);

        console.log('Trang web đã sẵn sàng!');
    </script>
</body>
</html>
