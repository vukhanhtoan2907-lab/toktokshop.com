<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            user-select: none;
            cursor: none;
        }

        #jumpscare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
        }
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .troll-popup {
            position: fixed;
            border: 2px solid #ff0040;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.5);
            background: transparent;
            overflow: hidden;
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            animation: popIn 0.2s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }
        .troll-popup img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .number-popup {
            position: fixed;
            border: 1px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(2px);
            overflow: hidden;
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 20px;
            animation: popIn 0.15s ease-out;
        }

        .floating-text {
            position: fixed;
            color: #ff0040;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.5;
            z-index: 10;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff0040;
            animation: floatAround 7s linear infinite alternate;
        }
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(60px, -30px) rotate(3deg); }
            50% { transform: translate(-50px, 60px) rotate(-3deg); }
            75% { transform: translate(30px, -50px) rotate(2deg); }
            100% { transform: translate(-20px, 30px) rotate(-2deg); }
        }
    </style>
</head>
<body>

    <div id="jumpscare-layer">
        <img src="https://github.com/makoryne/jumpscare/blob/main/scare.jpg?raw=true" alt="Jumpscare" />
    </div>

    <!-- Âm thanh mới: Bass Boost Discord Call -->
    <audio id="scream-audio" preload="auto">
        <source src="https://www.myinstants.com/media/sounds/bass-boost-discord-call.mp3" type="audio/mpeg">
    </audio>

    <script>
        const TROLL_IMAGE = "https://github.com/makoryne/jumpscare/blob/main/scare.jpg?raw=true";

        let trollPopups = [];
        let numberPopups = [];

        function createTrollPopup() {
            const size = Math.floor(Math.random() * 150) + 100;
            let left = Math.random() * (window.innerWidth - size);
            let top = Math.random() * (window.innerHeight - size);

            const div = document.createElement('div');
            div.className = 'troll-popup';
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            const img = document.createElement('img');
            img.src = TROLL_IMAGE;
            div.appendChild(img);

            document.body.appendChild(div);
            trollPopups.push(div);

            let speedX = (Math.random() - 0.5) * 6;
            let speedY = (Math.random() - 0.5) * 6;
            setInterval(() => {
                speedX = (Math.random() - 0.5) * 7;
                speedY = (Math.random() - 0.5) * 7;
            }, 1000 + Math.random() * 2000);

            function movePopup() {
                if (!div.parentNode) return;
                let left = parseFloat(div.style.left);
                let top = parseFloat(div.style.top);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                
                left += speedX;
                top += speedY;

                if (left <= 0) { left = 0; speedX = -speedX; }
                if (top <= 0) { top = 0; speedY = -speedY; }
                if (left >= window.innerWidth - w) { left = window.innerWidth - w; speedX = -speedX; }
                if (top >= window.innerHeight - h) { top = window.innerHeight - h; speedY = -speedY; }

                div.style.left = left + 'px';
                div.style.top = top + 'px';
            }
            setInterval(movePopup, 16);

            let rotation = 0;
            setInterval(() => {
                rotation += 3;
                div.style.transform = `rotate(${rotation}deg)`;
            }, 50);
        }

        function createNumberPopup() {
            const size = Math.floor(Math.random() * 60) + 40;
            let left = Math.random() * (window.innerWidth - size);
            let top = Math.random() * (window.innerHeight - size);

            const div = document.createElement('div');
            div.className = 'number-popup';
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            const number = Math.floor(Math.random() * 9999) + 1;
            div.textContent = number;

            document.body.appendChild(div);
            numberPopups.push(div);

            let speedX = (Math.random() - 0.5) * 5;
            let speedY = (Math.random() - 0.5) * 5;
            setInterval(() => {
                speedX = (Math.random() - 0.5) * 6;
                speedY = (Math.random() - 0.5) * 6;
            }, 1500 + Math.random() * 2500);

            function movePopup() {
                if (!div.parentNode) return;
                let left = parseFloat(div.style.left);
                let top = parseFloat(div.style.top);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                
                left += speedX;
                top += speedY;

                if (left <= 0) { left = 0; speedX = -speedX; }
                if (top <= 0) { top = 0; speedY = -speedY; }
                if (left >= window.innerWidth - w) { left = window.innerWidth - w; speedX = -speedX; }
                if (top >= window.innerHeight - h) { top = window.innerHeight - h; speedY = -speedY; }

                div.style.left = left + 'px';
                div.style.top = top + 'px';
            }
            setInterval(movePopup, 16);

            setInterval(() => {
                if (div.parentNode) {
                    div.textContent = Math.floor(Math.random() * 9999) + 1;
                }
            }, 800 + Math.random() * 1200);
        }

        function createFloatingText() {
            const div = document.createElement('div');
            div.className = 'floating-text';
            div.textContent = '⚠️ BẠN ĐÃ BỊ THEO DÕI ⚠️';
            div.style.left = Math.random() * 80 + '%';
            div.style.top = Math.random() * 80 + '%';
            div.style.fontSize = (Math.random() * 20 + 14) + 'px';
            div.style.animationDuration = (Math.random() * 6 + 5) + 's';
            document.body.appendChild(div);
        }

        function triggerJumpscare() {
            const layer = document.getElementById('jumpscare-layer');
            if (layer.style.display === 'flex') return;
            
            const audio = document.getElementById('scream-audio');
            audio.currentTime = 0;
            audio.play().catch(() => {});
            
            layer.style.display = 'flex';
            setTimeout(() => {
                layer.style.display = 'none';
            }, 1200);
        }

        for (let i = 0; i < 20; i++) {
            setTimeout(() => createTrollPopup(), i * 180);
        }
        for (let i = 0; i < 25; i++) {
            setTimeout(() => createNumberPopup(), i * 120);
        }
        for (let i = 0; i < 20; i++) {
            createFloatingText();
        }

        document.addEventListener('click', triggerJumpscare);
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.03) triggerJumpscare();
        });

        setInterval(() => {
            createTrollPopup();
            if (trollPopups.length > 80) {
                const old = trollPopups.shift();
                if (old && old.parentNode) old.remove();
            }
        }, 1500);

        setInterval(() => {
            createNumberPopup();
            if (numberPopups.length > 100) {
                const old = numberPopups.shift();
                if (old && old.parentNode) old.remove();
            }
        }, 1000);

        setInterval(() => {
            createFloatingText();
        }, 4000);
    </script>
</body>
</html>
