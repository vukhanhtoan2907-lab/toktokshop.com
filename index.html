<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d0d0d; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #counter-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 5px #00ff00;
            line-height: 1.4;
        }
        #main-content {
            text-align: center;
            color: #ffffff;
            z-index: 10;
        }
        #main-content h1 {
            font-size: 48px;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333;
            margin-bottom: 10px;
        }
        #main-content p {
            font-size: 18px;
            color: #aaaaaa;
        }
        #jumpscare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
        }
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Cửa sổ nhỏ đẹp hơn */
        .window-container {
            position: fixed;
            background: rgba(20, 20, 30, 0.85);
            border: 2px solid #ff0040;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.6);
            overflow: hidden;
            z-index: 50;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #ff3366;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3366;
            transition: box-shadow 0.2s;
            animation: glowPulse 2s infinite alternate;
        }
        .window-container:hover {
            box-shadow: 0 0 60px rgba(255, 0, 64, 1);
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 15px rgba(255, 0, 64, 0.3); }
            100% { box-shadow: 0 0 40px rgba(255, 0, 64, 0.9); }
        }
        .window-container .number {
            font-size: 3em;
            animation: flicker 0.5s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.7; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        /* Nút đóng ẩn nhưng vẫn hoạt động */
        .window-container .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            color: #ff0040;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 0 8px;
            border-radius: 50%;
            line-height: 1.2;
            transition: 0.2s;
        }
        .window-container .close-btn:hover {
            color: #fff;
            background: #ff0040;
        }
    </style>
</head>
<body>

    <div id="counter-container"></div>

    <div id="main-content">
        <h1>CHÀO MỪNG</h1>
        <p>Di chuột xung quanh...</p>
    </div>

    <div id="jumpscare-layer">
        <img src="https://i.pinimg.com/originals/9a/1e/fe/9a1efee781490b1bf24a5fd54f0ce895.gif" alt="Jumpscare" />
    </div>

    <script>
        // --- 1. Cửa sổ nhỏ di chuyển toàn màn hình và đẹp ---
        const windows = [];
        function createWindow() {
            const w = Math.floor(Math.random() * 100) + 60;  // 60-160px
            const h = Math.floor(Math.random() * 100) + 60;
            const left = Math.random() * (window.innerWidth - w);
            const top = Math.random() * (window.innerHeight - h);

            const div = document.createElement('div');
            div.className = 'window-container';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.style.left = left + 'px';
            div.style.top = top + 'px';

            // Số ngẫu nhiên
            const num = Math.floor(Math.random() * 99999) + 1;
            const numSpan = document.createElement('span');
            numSpan.className = 'number';
            numSpan.textContent = num;
            div.appendChild(numSpan);

            // Nút đóng (ẩn nhưng để đóng thủ công nếu cần)
            const closeBtn = document.createElement('span');
            closeBtn.className = 'close-btn';
            closeBtn.textContent = '×';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                div.remove();
                const idx = windows.indexOf(div);
                if (idx > -1) windows.splice(idx, 1);
            };
            div.appendChild(closeBtn);

            document.body.appendChild(div);
            windows.push(div);

            // --- Chuyển động toàn màn hình (ngẫu nhiên, đổi hướng khi chạm biên) ---
            let speedX = (Math.random() - 0.5) * 2.5;
            let speedY = (Math.random() - 0.5) * 2.5;
            // Đổi hướng sau mỗi 1-4 giây
            const changeDirection = setInterval(() => {
                speedX = (Math.random() - 0.5) * 3;
                speedY = (Math.random() - 0.5) * 3;
            }, 1000 + Math.random() * 3000);

            function moveWindow() {
                if (!div.parentNode) {
                    clearInterval(changeDirection);
                    clearInterval(moveInterval);
                    return;
                }
                let left = parseFloat(div.style.left);
                let top = parseFloat(div.style.top);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                
                left += speedX;
                top += speedY;

                // Bounce tại biên
                if (left <= 0) { left = 0; speedX = -speedX; }
                if (top <= 0) { top = 0; speedY = -speedY; }
                if (left >= window.innerWidth - w) { left = window.innerWidth - w; speedX = -speedX; }
                if (top >= window.innerHeight - h) { top = window.innerHeight - h; speedY = -speedY; }

                div.style.left = left + 'px';
                div.style.top = top + 'px';
            }

            const moveInterval = setInterval(moveWindow, 16); // ~60fps

            // Lưu interval để dừng khi xóa
            div.dataset.moveInterval = moveInterval;
            div.dataset.changeInterval = changeDirection;
        }

        // --- 2. Số nhỏ bay lung tung (floaters) ---
        function createFloatingNumbers(count) {
            const container = document.getElementById('counter-container');
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = Math.floor(Math.random() * 99999) + 1;
                span.style.position = 'absolute';
                span.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                span.style.fontSize = `${Math.floor(Math.random() * 12) + 8}px`;
                span.style.fontWeight = 'bold';
                span.style.pointerEvents = 'none';
                span.style.opacity = '0.6';
                span.style.whiteSpace = 'nowrap';
                
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                span.style.left = x + 'px';
                span.style.top = y + 'px';
                container.appendChild(span);
                
                const speedX = (Math.random() - 0.5) * 0.8;
                const speedY = (Math.random() - 0.5) * 0.8;
                const updateInterval = setInterval(() => {
                    let currentLeft = parseFloat(span.style.left);
                    let currentTop = parseFloat(span.style.top);
                    if (isNaN(currentLeft)) currentLeft = 0;
                    if (isNaN(currentTop)) currentTop = 0;
                    
                    let newLeft = currentLeft + speedX;
                    let newTop = currentTop + speedY;
                    
                    if (newLeft < 0 || newLeft > window.innerWidth - 50) {
                        span.style.left = Math.random() * window.innerWidth + 'px';
                        span.style.top = Math.random() * window.innerHeight + 'px';
                    } else {
                        span.style.left = newLeft + 'px';
                    }
                    if (newTop < 0 || newTop > window.innerHeight - 20) {
                        span.style.left = Math.random() * window.innerWidth + 'px';
                        span.style.top = Math.random() * window.innerHeight + 'px';
                    } else {
                        span.style.top = newTop + 'px';
                    }
                }, 50);
                span.dataset.interval = updateInterval;
            }
        }

        // --- 3. Jumpscare ---
        function triggerJumpscare() {
            const layer = document.getElementById('jumpscare-layer');
            if (layer.style.display === 'flex') return;
            layer.style.display = 'flex';
            setTimeout(() => {
                layer.style.display = 'none';
            }, 1500);
        }

        // --- Khởi tạo ---
        // Tạo 25 cửa sổ di chuyển toàn màn hình
        for (let i = 0; i < 25; i++) {
            setTimeout(() => createWindow(), i * 100);
        }
        // Tạo 60 số nhỏ bay
        createFloatingNumbers(60);

        // Sự kiện jumpscare
        document.addEventListener('click', triggerJumpscare);
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.03) triggerJumpscare();
        });

        // Tạo thêm cửa sổ mới mỗi 4 giây (tăng dần số lượng)
        setInterval(() => {
            createWindow();
            // Nếu có quá nhiều, xóa bớt cửa sổ cũ
            if (windows.length > 60) {
                const old = windows.shift();
                if (old && old.parentNode) old.remove();
            }
        }, 4000);

        console.log('Trang web đã sẵn sàng!');
    </script>
</body>
</html>
