<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d0d0d; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #counter-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 5px #00ff00;
            line-height: 1.4;
        }
        #main-content {
            text-align: center;
            color: #ffffff;
            z-index: 10;
        }
        #main-content h1 {
            font-size: 48px;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333;
            margin-bottom: 10px;
        }
        #main-content p {
            font-size: 18px;
            color: #aaaaaa;
        }
        #jumpscare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
        }
        #jumpscare-layer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Khu vực đếm số nhỏ -->
    <div id="counter-container"></div>

    <!-- Nội dung chính -->
    <div id="main-content">
        <h1>CHÀO MỪNG</h1>
        <p>Di chuột xung quanh...</p>
    </div>

    <!-- Lớp jumpscare (ẩn mặc định) -->
    <div id="jumpscare-layer">
        <img src="https://media.tenor.com/On7KVX9l2eAAAAAj/scary-face.gif" alt="Jumpscare" />
    </div>

    <script>
        // --- 1. Tạo nhiều cửa sổ nhỏ (popup) ---
        function createSmallWindows(count) {
            for (let i = 0; i < count; i++) {
                // Tính kích thước ngẫu nhiên (100x100 đến 300x300)
                const w = Math.floor(Math.random() * 200) + 100;
                const h = Math.floor(Math.random() * 200) + 100;
                // Vị trí ngẫu nhiên không tràn màn hình
                const left = Math.floor(Math.random() * (window.screen.availWidth - w));
                const top = Math.floor(Math.random() * (window.screen.availHeight - h));

                const win = window.open(
                    "",
                    "_blank",
                    `width=${w},height=${h},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,scrollbars=no,resizable=no`
                );
                if (win) {
                    // Đổ nội dung vào cửa sổ nhỏ
                    win.document.write(`
                        <html><head><style>
                            body { 
                                background-color: #1a1a1a; 
                                color: #ff5555; 
                                font-family: monospace; 
                                display: flex; 
                                justify-content: center; 
                                align-items: center; 
                                height: 100%; 
                                margin: 0; 
                                overflow: hidden;
                                font-size: 20px;
                            }
                            .number { font-size: 40px; font-weight: bold; }
                        </style></head>
                        <body>
                            <div class="number">${Math.floor(Math.random() * 9999) + 1}</div>
                        </body></html>
                    `);
                    win.document.close();
                }
            }
        }

        // --- 2. Hàm tạo chữ số nhỏ chạy quanh màn hình (floaters) ---
        function createFloatingNumbers(count) {
            const container = document.getElementById('counter-container');
            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.textContent = Math.floor(Math.random() * 99999) + 1;
                span.style.position = 'absolute';
                span.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                span.style.fontSize = `${Math.floor(Math.random() * 12) + 8}px`;
                span.style.fontWeight = 'bold';
                span.style.pointerEvents = 'none';
                span.style.opacity = '0.6';
                span.style.whiteSpace = 'nowrap';
                
                // Vị trí ban đầu ngẫu nhiên
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                span.style.left = x + 'px';
                span.style.top = y + 'px';
                
                container.appendChild(span);
                
                // Chuyển động chậm ngẫu nhiên
                const speedX = (Math.random() - 0.5) * 0.8;
                const speedY = (Math.random() - 0.5) * 0.8;
                const updateInterval = setInterval(() => {
                    let currentLeft = parseFloat(span.style.left);
                    let currentTop = parseFloat(span.style.top);
                    if (isNaN(currentLeft)) currentLeft = 0;
                    if (isNaN(currentTop)) currentTop = 0;
                    
                    let newLeft = currentLeft + speedX;
                    let newTop = currentTop + speedY;
                    
                    // Đảo chiều khi chạm biên
                    if (newLeft < 0 || newLeft > window.innerWidth - 50) {
                        span.style.left = Math.random() * window.innerWidth + 'px';
                        span.style.top = Math.random() * window.innerHeight + 'px';
                    } else {
                        span.style.left = newLeft + 'px';
                    }
                    if (newTop < 0 || newTop > window.innerHeight - 20) {
                        span.style.left = Math.random() * window.innerWidth + 'px';
                        span.style.top = Math.random() * window.innerHeight + 'px';
                    } else {
                        span.style.top = newTop + 'px';
                    }
                }, 50);
                
                // Lưu interval để dừng khi cần (tùy)
                span.dataset.interval = updateInterval;
            }
        }

        // --- 3. Jumpscare (kích hoạt khi click hoặc di chuột) ---
        function triggerJumpscare() {
            const layer = document.getElementById('jumpscare-layer');
            if (layer.style.display === 'flex') return; // đã hiện thì thôi
            layer.style.display = 'flex';
            // Phát âm thanh nếu muốn
            // const audio = new Audio('scream.mp3'); audio.play();
            setTimeout(() => {
                layer.style.display = 'none';
            }, 1200); // ẩn sau 1.2 giây
        }

        // --- Kích hoạt ---
        // Tạo 20 cửa sổ nhỏ (có thể tăng lên 30-50 nếu muốn)
        createSmallWindows(20);
        
        // Tạo 50 con số nhỏ bay lung tung
        createFloatingNumbers(50);

        // Sự kiện kích hoạt jumpscare
        document.addEventListener('click', triggerJumpscare);
        document.addEventListener('mousemove', (e) => {
            // Kích hoạt nếu di chuột nhanh (ngẫu nhiên 5% cơ hội mỗi lần)
            if (Math.random() < 0.05) {
                triggerJumpscare();
            }
        });

        // Tạo thêm cửa sổ mới sau mỗi 5 giây (tăng dần)
        setInterval(() => {
            createSmallWindows(5);
        }, 5000);

        console.log('Trang web đã sẵn sàng!');
    </script>
</body>
</html>
