<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
            cursor: not-allowed;
        }
        
        /* Lớp jumpscare */
        #jumpscare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            pointer-events: none;
        }
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Cửa sổ popup kiểu Windows 95/XP */
        .window-popup {
            position: fixed;
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px;
            min-width: 160px;
            min-height: 120px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.8);
            z-index: 500;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            animation: popIn 0.2s ease-out;
            resize: both;
            overflow: hidden;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .window-popup .title-bar {
            background: #000080;
            color: #fff;
            padding: 4px 6px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
        .window-popup .title-bar .title {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .window-popup .title-bar .title .icon {
            width: 16px;
            height: 16px;
            background: #ff0040;
            border-radius: 50%;
            display: inline-block;
        }
        .window-popup .title-bar .controls {
            display: flex;
            gap: 2px;
        }
        .window-popup .title-bar .controls button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            width: 20px;
            height: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }
        .window-popup .title-bar .controls button:active {
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .window-popup .title-bar .controls .close-btn {
            background: #ff0040;
            color: #fff;
        }
        .window-popup .title-bar .controls .close-btn:hover {
            background: #ff3366;
        }
        .window-popup .content {
            background: #fff;
            padding: 20px 10px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            font-family: 'Courier New', monospace;
            min-height: 80px;
        }
        .window-popup .content .number {
            animation: blink 0.5s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Chữ trôi nổi */
        .floating-text {
            position: fixed;
            color: #ff0040;
            font-family: 'Comic Sans MS', sans-serif;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0.6;
            z-index: 10;
            white-space: nowrap;
            animation: floatAround 6s linear infinite alternate;
        }
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(80px, -40px) rotate(5deg); }
            50% { transform: translate(-60px, 80px) rotate(-5deg); }
            75% { transform: translate(40px, -60px) rotate(3deg); }
            100% { transform: translate(-30px, 40px) rotate(-3deg); }
        }

        /* Nút mở cửa sổ giống Windows */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 40px;
            background: #c0c0c0;
            border-top: 2px solid #fff;
            border-bottom: 2px solid #808080;
            z-index: 999;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }
        #start-btn {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #start-btn:active {
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        #start-btn .logo {
            width: 18px;
            height: 18px;
            background: #ff0040;
            border-radius: 50%;
            display: inline-block;
        }
        #taskbar .tray {
            margin-left: auto;
            color: #000;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 12px;
            background: #c0c0c0;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>
<body>

    <!-- Lớp jumpscare -->
    <div id="jumpscare-layer">
        <img src="https://i.pinimg.com/originals/9a/1e/fe/9a1efee781490b1bf24a5fd54f0ce895.gif" alt="Jumpscare" />
    </div>

    <!-- Thanh taskbar kiểu Windows -->
    <div id="taskbar">
        <button id="start-btn">
            <span class="logo"></span> Bắt đầu
        </button>
        <div class="tray">10:00 AM</div>
    </div>

    <script>
        // --- Danh sách tiêu đề cửa sổ ngẫu nhiên ---
        const titles = [
            "Thông báo", "Cảnh báo", "Lỗi hệ thống", "Virus đã phát hiện",
            "Không thể thoát", "Bạn đã bị theo dõi", "Mật khẩu sai",
            "Kết nối thất bại", "Cập nhật virus", "Tường lửa chặn"
        ];

        // --- Tạo cửa sổ popup kiểu Windows ---
        let popupCount = 0;
        const popups = [];
        let zIndexCounter = 500;

        function createPopup() {
            const w = Math.floor(Math.random() * 180) + 120;
            const h = Math.floor(Math.random() * 160) + 100;
            let left = Math.random() * (window.innerWidth - w - 20);
            let top = Math.random() * (window.innerHeight - h - 60);
            if (left < 0) left = 0;
            if (top < 0) top = 0;

            const div = document.createElement('div');
            div.className = 'window-popup';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.style.left = left + 'px';
            div.style.top = top + 'px';
            div.style.zIndex = zIndexCounter++;

            // Title bar
            const titleBar = document.createElement('div');
            titleBar.className = 'title-bar';
            const titleSpan = document.createElement('span');
            titleSpan.className = 'title';
            titleSpan.innerHTML = `<span class="icon"></span> ${titles[Math.floor(Math.random() * titles.length)]}`;
            titleBar.appendChild(titleSpan);

            const controls = document.createElement('div');
            controls.className = 'controls';
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-btn';
            closeBtn.textContent = '✕';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                // Không đóng thật, chỉ đổi nội dung
                contentSpan.textContent = Math.floor(Math.random() * 999999) + 1;
            };
            controls.appendChild(closeBtn);
            titleBar.appendChild(controls);
            div.appendChild(titleBar);

            // Content
            const content = document.createElement('div');
            content.className = 'content';
            const contentSpan = document.createElement('span');
            contentSpan.className = 'number';
            contentSpan.textContent = Math.floor(Math.random() * 999999) + 1;
            content.appendChild(contentSpan);
            div.appendChild(content);

            document.body.appendChild(div);
            popups.push(div);
            popupCount++;

            // --- Di chuyển toàn màn hình ---
            let speedX = (Math.random() - 0.5) * 3;
            let speedY = (Math.random() - 0.5) * 3;
            setInterval(() => {
                speedX = (Math.random() - 0.5) * 4;
                speedY = (Math.random() - 0.5) * 4;
            }, 2000 + Math.random() * 3000);

            function movePopup() {
                if (!div.parentNode) return;
                let left = parseFloat(div.style.left);
                let top = parseFloat(div.style.top);
                const w = parseFloat(div.style.width);
                const h = parseFloat(div.style.height);
                
                left += speedX;
                top += speedY;

                if (left <= 0) { left = 0; speedX = -speedX; }
                if (top <= 0) { top = 0; speedY = -speedY; }
                if (left >= window.innerWidth - w) { left = window.innerWidth - w; speedX = -speedX; }
                if (top >= window.innerHeight - h - 60) { top = window.innerHeight - h - 60; speedY = -speedY; }

                div.style.left = left + 'px';
                div.style.top = top + 'px';
            }
            setInterval(movePopup, 16);

            // Tự động đổi số
            setInterval(() => {
                if (div.parentNode) {
                    contentSpan.textContent = Math.floor(Math.random() * 999999) + 1;
                }
            }, 1000 + Math.random() * 2000);

            // Click vào cửa sổ => đưa lên đầu
            div.addEventListener('mousedown', () => {
                div.style.zIndex = zIndexCounter++;
            });
        }

        // --- Chữ trôi nổi ---
        function createFloatingText() {
            const div = document.createElement('div');
            div.className = 'floating-text';
            div.textContent = Math.random() < 0.5 ? '⚠️ BẠN KHÔNG THỂ THOÁT ⚠️' : '🔴 VIRUS ĐÃ KÍCH HOẠT 🔴';
            div.style.left = Math.random() * 80 + '%';
            div.style.top = Math.random() * 80 + '%';
            div.style.fontSize = (Math.random() * 20 + 12) + 'px';
            div.style.animationDuration = (Math.random() * 6 + 4) + 's';
            document.body.appendChild(div);
        }

        // --- Jumpscare ---
        function triggerJumpscare() {
            const layer = document.getElementById('jumpscare-layer');
            if (layer.style.display === 'flex') return;
            layer.style.display = 'flex';
            setTimeout(() => {
                layer.style.display = 'none';
            }, 1200);
        }

        // --- Khởi tạo ---
        // Tạo 20 cửa sổ Windows
        for (let i = 0; i < 20; i++) {
            setTimeout(() => createPopup(), i * 200);
        }
        // Tạo 15 chữ trôi nổi
        for (let i = 0; i < 15; i++) {
            createFloatingText();
        }

        // Nút Start
        document.getElementById('start-btn').addEventListener('click', () => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => createPopup(), i * 150);
            }
            if (Math.random() < 0.3) triggerJumpscare();
        });

        // Click bất kỳ => jumpscare
        document.addEventListener('click', triggerJumpscare);

        // Di chuột => cơ hội jumpscare
        document.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.02) triggerJumpscare();
        });

        // Tự động thêm cửa sổ mỗi 1.5 giây
        setInterval(() => {
            createPopup();
            if (popups.length > 80) {
                const old = popups.shift();
                if (old && old.parentNode) old.remove();
            }
        }, 1500);

        // Tự động thêm chữ mỗi 4 giây
        setInterval(() => {
            createFloatingText();
        }, 4000);

        console.log('Trang web đã sẵn sàng!');
    </script>
</body>
</html>
